# ─────────────────────────────────────────────────────────────────────────────
#  Walletly — Nginx virtual host
#
#  HTTP  → redirects to HTTPS  (comment out the HTTPS block if no cert yet)
#  HTTPS → serves Vite static files + proxies /api to backend
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream: Express backend ─────────────────────────────────────────────────
upstream backend {
    server backend:4000;
    keepalive 32;
}

# ── HTTP — redirect to HTTPS (or serve directly if no TLS) ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (used by Docker + load balancers)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Comment the next 2 lines and uncomment the HTTPS block below
    # once you have TLS certificates in ./nginx/certs/
    root  /usr/share/nginx/html;
    include /etc/nginx/conf.d/walletly_locations.conf;

    # Uncomment to force HTTPS:
    # return 301 https://$host$request_uri;
}

