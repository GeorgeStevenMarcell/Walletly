version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Walletly — Full Stack
#
#  Services
#  ├── postgres      Primary data store
#  ├── redis         Session store + API response cache + rate-limit counters
#  ├── backend       Node/Express REST API  (internal only)
#  ├── frontend      Vite build → static files copied to shared volume
#  ├── nginx         Reverse proxy + static file server  (port 80)
#  └── cloudflared   Cloudflare Tunnel
#
#  Quick start
#  ─────────────
#  cp .env.example .env          # fill in secrets
#  docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: walletly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-walletly}
      POSTGRES_USER:     ${POSTGRES_USER:-walletly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-walletly_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"      # remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walletly} -d ${POSTGRES_DB:-walletly}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: walletly_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"      # remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: walletly_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:         ${NODE_ENV:-production}
      PORT:             4000
      DATABASE_URL:     postgresql://${POSTGRES_USER:-walletly}:${POSTGRES_PASSWORD:-walletly_secret}@postgres:5432/${POSTGRES_DB:-walletly}
      REDIS_URL:        redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET:       ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN:   ${JWT_EXPIRES_IN:-7d}
      SESSION_SECRET:   ${SESSION_SECRET:?SESSION_SECRET must be set in .env}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - backend_logs:/app/logs
    # backend is NOT exposed to host — only nginx reaches it
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: walletly_frontend_build
    volumes:
      - frontend_dist:/app/dist
    restart: "no"

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: walletly_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/walletly.conf:/etc/nginx/conf.d/default.conf:ro
#      - ./nginx/conf.d/walletly_locations.conf:/etc/nginx/conf.d/walletly_locations.conf:ro
#      - ./nginx/conf.d/walletly_locations.conf.inc:/etc/nginx/conf.d/walletly_locations.conf:ro
      - ./nginx/conf.d/walletly_locations.conf.inc:/etc/nginx/walletly_locations.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: walletly_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - default

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  frontend_dist:

networks:
  default:
    name: walletly_net